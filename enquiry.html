<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Page title -->
    <title>DennyCare Clinic - Enquiry</title>

<body>

    <!-- Header with navigation -->
    <header>
        <h1>DennyCare Clinic</h1>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="enquiry.html">Enquiry</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main content -->
    <main>

        <!-- Enquiry Form Section -->
        <section>
            <h2>Send Us an Enquiry</h2>
            <p>Please fill in the form below and we will get back to you.</p>

            <!-- Form -->
            <form>

                <!-- Name -->
                <label for="name">Full Name:</label><br>
                <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>

                <!-- Email -->
                <label for="email">Email Address:</label><br>
                <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

                <!-- Message -->
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" placeholder="Type your message here"></textarea><br><br>

                <!-- Submit button -->
                <input type="submit" value="Submit">

            </form>
        </section>

    </main>

    <!-- Footer -->
    <footer>

    </footer>

</body>
